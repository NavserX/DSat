<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FixIt - Panel de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-lg shadow-sm">
        <h1 class="text-2xl font-bold text-blue-700">🛠️ Sistema de Reparaciones</h1>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">Cerrar Sesión</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2" id="form-title">Nueva Reparación</h2>
            <input type="hidden" id="rep-id"> <label class="block text-sm font-medium text-gray-700 mt-3">ID Cliente</label>
            <input type="number" id="cliente_id" class="w-full p-2 border rounded mt-1" value="1">

            <label class="block text-sm font-medium text-gray-700 mt-3">ID Técnico</label>
            <input type="number" id="tecnico_id" class="w-full p-2 border rounded mt-1" value="1">

            <label class="block text-sm font-medium text-gray-700 mt-3">ID Marca</label>
            <input type="number" id="marca_id" class="w-full p-2 border rounded mt-1" value="1">

            <label class="block text-sm font-medium text-gray-700 mt-3">Descripción</label>
            <textarea id="descripcion" class="w-full p-2 border rounded mt-1" rows="3"></textarea>

            <label class="block text-sm font-medium text-gray-700 mt-3">Estado</label>
            <select id="estado" class="w-full p-2 border rounded mt-1">
                <option value="pendiente">Pendiente</option>
                <option value="en proceso">En proceso</option>
                <option value="terminado">Terminado</option>
            </select>

            <button onclick="guardarReparacion()" class="w-full bg-green-600 text-white p-2 rounded mt-6 hover:bg-green-700 font-bold">
                Guardar Cambios
            </button>
            <button onclick="limpiarFormulario()" class="w-full text-gray-500 text-sm mt-2 underline">Cancelar / Nuevo</button>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md">
            <table class="min-w-full text-sm">
                <thead>
                <tr class="bg-gray-50 text-gray-500 uppercase">
                    <th class="py-3 px-4 text-left">ID</th>
                    <th class="py-3 px-4 text-left">Cliente / Marca</th>
                    <th class="py-3 px-4 text-left">Estado</th>
                    <th class="py-3 px-4 text-center">Acciones</th>
                </tr>
                </thead>
                <tbody id="tabla-reparaciones"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function cargarReparaciones() {
        const res = await fetch('/api/reparaciones', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const tbody = document.getElementById('tabla-reparaciones');
        tbody.innerHTML = '';

        data.forEach(rep => {
            tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-4 px-4 font-bold text-blue-600">#${rep.id}</td>
                        <td class="py-4 px-4">
                            <div class="font-medium text-gray-900">${rep.cliente?.nombre || 'S/N'}</div>
                            <div class="text-gray-500 text-xs">${rep.marca?.nombre || 'Marca'}</div>
                        </td>
                        <td class="py-4 px-4">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${rep.estado === 'terminado' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                ${rep.estado}
                            </span>
                        </td>
                        <td class="py-4 px-4 text-center space-x-2">
                            <button onclick='editarReparacion(${JSON.stringify(rep)})' class="text-blue-500 hover:text-blue-700">✏️</button>
                            <button onclick="borrarReparacion(${rep.id})" class="text-red-500 hover:text-red-700">🗑️</button>
                        </td>
                    </tr>
                `;
        });
    }

    async function guardarReparacion() {
        const id = document.getElementById('rep-id').value;
        const payload = {
            cliente_id: document.getElementById('cliente_id').value,
            tecnico_id: document.getElementById('tecnico_id').value,
            marca_id: document.getElementById('marca_id').value,
            descripcion: document.getElementById('descripcion').value,
            estado: document.getElementById('estado').value
        };

        const url = id ? `/api/reparaciones/${id}` : '/api/reparaciones';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method: method,
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert('¡Éxito!');
            limpiarFormulario();
            cargarReparaciones();
        } else {
            const err = await res.json();
            alert('Error: ' + JSON.stringify(err.errors));
        }
    }

    async function borrarReparacion(id) {
        if (!confirm('¿Seguro que quieres borrar esto?')) return;

        const res = await fetch(`/api/reparaciones/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) cargarReparaciones();
    }

    function editarReparacion(rep) {
        document.getElementById('form-title').innerText = "Editando #" + rep.id;
        document.getElementById('rep-id').value = rep.id;
        document.getElementById('cliente_id').value = rep.cliente_id;
        document.getElementById('tecnico_id').value = rep.tecnico_id;
        document.getElementById('marca_id').value = rep.marca_id;
        document.getElementById('descripcion').value = rep.descripcion;
        document.getElementById('estado').value = rep.estado;
    }

    function limpiarFormulario() {
        document.getElementById('form-title').innerText = "Nueva Reparación";
        document.getElementById('rep-id').value = '';
        document.getElementById('descripcion').value = '';
        document.getElementById('estado').value = 'pendiente';
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    cargarReparaciones();
</script>
</body>
</html>
